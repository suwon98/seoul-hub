name: Monorepo CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    name: Backend CI & API Spec Extract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/backend/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Generate OpenAPI
        if: steps.filter.outputs.backend == 'true'
        run: |
          cd apps/backend
          chmod +x ./gradlew
          ./gradlew build

      - name: Sync API Docs to Notion
        if: steps.filter.outputs.backend == 'true'
        run: |
          node scripts/sync-to-notion.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'

      - name: Install pnpm
        if: steps.filter.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: '11.3.0'

      - name: Set up Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies & Build
        if: steps.filter.outputs.frontend == 'true'
        run: |
          pnpm install
          pnpm --filter frontend build