name: Monorepo CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. 백엔드(Spring Boot) 변경 시 검증 작업
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/backend/**'

      - name: Set up JDK 21
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        if: steps.filter.outputs.backend == 'true'
        run: |
          cd apps/backend
          chmod +x ./gradlew
          ./gradlew build -x test

  # 2. 프론트엔드(Next.js) 변경 시 검증 작업
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'

      - name: Install pnpm
        if: steps.filter.outputs.frontend == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Set up Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies & Build
        if: steps.filter.outputs.frontend == 'true'
        run: |
          pnpm install
          pnpm --filter frontend build